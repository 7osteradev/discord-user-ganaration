<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Username Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #5865f2;
    --accent2: #7289da;
    --green: #23a559;
    --green-bg: rgba(35,165,89,0.12);
    --red: #ed4245;
    --red-bg: rgba(237,66,69,0.12);
    --yellow: #faa81a;
    --yellow-bg: rgba(250,168,26,0.1);
    --text: #e3e5e8;
    --muted: #8e9297;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(88,101,242,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,101,242,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(88,101,242,0.08) 0%, transparent 70%);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.2rem;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 28px; height: 28px; fill: white; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .tagline {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 0.5rem;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.8rem;
    margin-bottom: 1.2rem;
    animation: fadeUp 0.5s ease both;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.4rem;
  }

  .mode-tab {
    padding: 8px 20px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-tab:hover { background: var(--surface2); color: var(--text); }
  .mode-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* Controls row */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.4rem;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ctrl-group label {
    font-size: 0.78rem;
    color: var(--muted);
  }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .gen-btn {
    padding: 10px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: auto;
  }

  .gen-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(88,101,242,0.3); }
  .gen-btn:active { transform: scale(0.97); }

  /* Results */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .result-count {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .copy-all-btn {
    padding: 6px 14px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-all-btn:hover { color: var(--text); border-color: var(--border2); }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
  }

  .uname-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s, transform 0.15s;
    animation: popIn 0.3s ease both;
  }

  .uname-card:hover { border-color: var(--border2); transform: translateY(-1px); }

  .uname-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .uname-text {
    font-family: var(--mono);
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.3px;
  }

  .uname-len {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .uname-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .type-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
  }

  .type-3 { background: rgba(88,101,242,0.18); color: var(--accent2); }
  .type-4 { background: rgba(250,168,26,0.15); color: var(--yellow); }
  .type-semi { background: rgba(35,165,89,0.15); color: var(--green); }

  .status-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    font-family: 'Cairo', sans-serif;
    transition: all 0.2s;
  }

  .status-idle { background: var(--surface); color: var(--muted); border: 1px solid var(--border2); }
  .status-idle:hover { color: var(--text); }
  .status-loading { background: var(--yellow-bg); color: var(--yellow); }
  .status-free { background: var(--green-bg); color: var(--green); }
  .status-taken { background: var(--red-bg); color: var(--red); }

  .copy-mini {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 2px 6px;
    border-radius: 5px;
    transition: all 0.15s;
  }

  .copy-mini:hover { background: var(--border); color: var(--text); }

  /* Check section */
  .check-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .check-input {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .check-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,101,242,0.12); }
  .check-input::placeholder { color: var(--muted); }

  .check-btn {
    padding: 12px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .check-btn:hover { background: var(--accent2); }
  .check-btn:active { transform: scale(0.97); }

  .check-result {
    margin-top: 12px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    display: none;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }

  .check-result.show { display: flex; }
  .check-result.free { background: var(--green-bg); border: 1px solid rgba(35,165,89,0.2); color: var(--green); }
  .check-result.taken { background: var(--red-bg); border: 1px solid rgba(237,66,69,0.2); color: var(--red); }
  .check-result.invalid { background: var(--yellow-bg); border: 1px solid rgba(250,168,26,0.2); color: var(--yellow); }
  .check-result.loading { background: rgba(88,101,242,0.1); border: 1px solid rgba(88,101,242,0.2); color: var(--accent2); }

  .result-icon { font-size: 1.2rem; }

  .info-note {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.5;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 600;
    color: #fff;
  }

  .stat-lbl {
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.85rem;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(.22,.68,0,1.4);
    z-index: 9999;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Filters */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { background: rgba(88,101,242,0.15); color: var(--accent2); border-color: var(--accent); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Responsive */
  @media (max-width: 600px) {
    h1 { font-size: 1.7rem; }
    .controls { flex-direction: column; align-items: stretch; }
    .gen-btn { justify-content: center; }
    .check-row { flex-direction: column; }
    .check-btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="glow-orb"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <h1>Discord Username</h1>
    </div>
    <p class="tagline">dev by 7ostera</p>
  </header>

  <!-- Generator Card -->
  <div class="card" style="animation-delay:0.1s">
    <div class="card-title">الاعدادات</div>

    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('3',this)">ثلاثي (3)</button>
      <button class="mode-tab" onclick="setMode('4',this)">رباعي (4)</button>
      <button class="mode-tab" onclick="setMode('semi3',this)">شبه ثلاثي</button>
      <button class="mode-tab" onclick="setMode('all',this)">الكل معاً</button>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <label>نوع الحروف</label>
        <select id="charType">
          <option value="letters">حروف فقط (a-z)</option>
          <option value="numbers">أرقام فقط (0-9)</option>
          <option value="mixed" selected>حروف + أرقام</option>
          <option value="underscore">مع شرطة سفلية (_)</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>الكمية</label>
        <select id="amount">
          <option value="10">10 يوزرات</option>
          <option value="20" selected>20 يوزرات</option>
          <option value="30">30 يوزرات</option>
          <option value="50">50 يوزرات</option>
        </select>
      </div>
      <button class="gen-btn" onclick="generate()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        توليد
      </button>
    </div>
  </div>

  <!-- Results Card -->
  <div class="card" style="animation-delay:0.2s">
    <div class="results-header">
      <div class="card-title" style="margin-bottom:0">النتائج</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="result-count" id="resultCount">0 يوزرنيم</span>
        <button class="copy-all-btn" onclick="copyAll()">نسخ الكل</button>
        <button class="copy-all-btn" onclick="checkAll()">تحقق من الكل</button>
      </div>
    </div>

    <div class="filter-row" style="margin-top:1rem">
      <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
      <button class="filter-btn" onclick="setFilter('3',this)">ثلاثي</button>
      <button class="filter-btn" onclick="setFilter('4',this)">رباعي</button>
      <button class="filter-btn" onclick="setFilter('semi3',this)">شبه ثلاثي</button>
      <button class="filter-btn" onclick="setFilter('free',this)">متاح ✓</button>
      <button class="filter-btn" onclick="setFilter('taken',this)">مستعمل ✗</button>
    </div>

    <div class="results-grid" id="resultsGrid">
      <div style="color:var(--muted);font-size:0.9rem;grid-column:1/-1;text-align:center;padding:2rem 0">اضغط "توليد" للبدء</div>
    </div>
  </div>

  <!-- Rate Limit Bar -->
  <div id="rateBar" style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;border:1px solid rgba(35,165,89,0.2);background:var(--green-bg);margin-bottom:1.2rem;transition:all 0.4s;">
    <span id="rateDot" style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;"></span>
    <span id="rateText" style="font-size:0.85rem;color:var(--text);">API متاح — 0 طلب تم</span>
  </div>

  <!-- Check Card -->
  <div class="card" style="animation-delay:0.3s">
    <div class="card-title">التحقق من يوزرنيم معين</div>
    <div class="check-row">
      <input
        class="check-input"
        id="checkInput"
        type="text"
        placeholder="اكتب اليوزرنيم هنا..."
        maxlength="32"
        oninput="sanitizeInput(this)"
        onkeydown="if(event.key==='Enter')checkUsername()"
        dir="ltr"
      >
      <button class="check-btn" onclick="checkUsername()">تحقق</button>
    </div>
    <div id="checkResult" class="check-result">
      <span class="result-icon" id="checkIcon"></span>
      <span id="checkText"></span>
    </div>
  </div>

  <!-- Stats Card -->
  <div class="card" style="animation-delay:0.4s">
    <div class="card-title">إحصائيات</div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-val" id="statTotal">0</span>
        <span class="stat-lbl">إجمالي التوليد</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" style="color:var(--green)" id="statFree">0</span>
        <span class="stat-lbl">متاح</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" style="color:var(--red)" id="statTaken">0</span>
        <span class="stat-lbl">مستعمل</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" style="color:var(--yellow)" id="statChecked">0</span>
        <span class="stat-lbl">تم التحقق منها</span>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let currentMode = '3';
  let currentFilter = 'all';
  let allUsernames = [];
  let stats = { total: 0, free: 0, taken: 0, checked: 0 };

  const letters = 'abcdefghijklmnopqrstuvwxyz';
  const numbers = '0123456789';

  // Common words that are likely taken
  const commonWords = new Set([
    'the','and','for','you','not','are','bot','api','dev','pro','app','web',
    'xyz','abc','lol','wow','hey','sup','bro','sis','god','ace','ice','fox',
    'cat','dog','owl','rat','cow','pig','hen','fly','ant','bee','red','blu',
    'grn','blk','wht','big','old','new','hot','top','max','ben','tom','sam',
    'joe','leo','dan','rob','bob','jim','kim','amy','ann','sue','dan','ron',
    'yt','gg','gl','wp','hp','mp','xp','lv','vip','mod','npc','pvp','rpg',
    'gta','nft','dao','btc','eth','ada','sol','dot','bnb','trx','xrp'
  ]);

  function getChars() {
    const t = document.getElementById('charType').value;
    if (t === 'letters') return letters;
    if (t === 'numbers') return numbers;
    if (t === 'mixed') return letters + numbers;
    if (t === 'underscore') return letters + numbers + '_';
    return letters + numbers;
  }

  function rand(chars) {
    return chars[Math.floor(Math.random() * chars.length)];
  }

  function randStr(len, chars) {
    let s = '';
    for (let i = 0; i < len; i++) s += rand(chars);
    return s;
  }

  function makeUsername(mode, chars) {
    if (mode === '3') {
      const useNums = chars.includes('0');
      return randStr(3, letters + (useNums ? numbers : ''));
    }
    if (mode === '4') {
      return randStr(4, chars);
    }
    if (mode === 'semi3') {
      const patterns = [
        () => randStr(3, letters) + rand(numbers),
        () => rand(numbers) + randStr(3, letters),
        () => randStr(2, letters) + rand(numbers) + rand(letters),
        () => randStr(3, letters) + rand(numbers) + rand(letters),
        () => randStr(2, letters) + randStr(2, numbers),
        () => randStr(2, letters) + '.' + rand(letters),
        () => rand(letters) + '.' + randStr(2, letters),
        () => randStr(2, letters) + '-' + rand(letters),
        () => rand(letters) + '-' + randStr(2, letters),
        () => '.' + randStr(3, letters),
        () => '_' + randStr(3, letters),
        () => '.' + randStr(2, letters) + rand(numbers),
        () => '_' + randStr(2, letters) + rand(numbers),
      ];
      return patterns[Math.floor(Math.random() * patterns.length)]();
    }
    return null;
  }

  function isValidUsername(name) {
    if (!name || name.length < 2 || name.length > 32) return false;
    if (!/^[a-z0-9_.\-]+$/.test(name)) return false;
    if (/[_.\-]{2}/.test(name)) return false;
    return true;
  }

  function simulateCheck(name) {
    if (commonWords.has(name.toLowerCase())) return 'taken';
    const seed = name.split('').reduce((a, c) => a * 31 + c.charCodeAt(0), 7);
    const takenChance = name.length <= 3 ? 0.7 : name.length === 4 ? 0.5 : 0.35;
    return (Math.abs(seed) % 100 < takenChance * 100) ? 'taken' : 'free';
  }

  let isRateLimited = false;
  let rateLimitUntil = 0;
  let totalRequests = 0;

  function updateRateStatus(limited, retryAfter) {
    isRateLimited = limited;
    if (limited && retryAfter) {
      rateLimitUntil = Date.now() + retryAfter * 1000;
    }
    const bar = document.getElementById('rateBar');
    const txt = document.getElementById('rateText');
    const dot = document.getElementById('rateDot');
    if (limited) {
      bar.style.background = 'var(--red-bg)';
      bar.style.borderColor = 'rgba(237,66,69,0.3)';
      dot.style.background = 'var(--red)';
      const secs = Math.ceil((rateLimitUntil - Date.now()) / 1000);
      txt.textContent = `محظور مؤقتاً (Rate Limited) — انتظر ${secs} ثانية`;
      setTimeout(() => {
        if (Date.now() >= rateLimitUntil) {
          isRateLimited = false;
          updateRateStatus(false);
        }
      }, retryAfter ? retryAfter * 1000 + 500 : 5000);
    } else {
      bar.style.background = 'var(--green-bg)';
      bar.style.borderColor = 'rgba(35,165,89,0.2)';
      dot.style.background = 'var(--green)';
      txt.textContent = `API متاح — ${totalRequests} طلب تم`;
    }
  }

  async function realCheck(name) {
    if (isRateLimited) {
      const secs = Math.ceil((rateLimitUntil - Date.now()) / 1000);
      updateRateStatus(true);
      return 'ratelimit';
    }
    try {
      const res = await fetch('https://discord.com/api/v9/unique-username/username-attempt-unauthed', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ username: name })
      });
      if (res.status === 429) {
        const data = await res.json().catch(() => ({}));
        const retryAfter = data.retry_after || 5;
        updateRateStatus(true, retryAfter);
        return 'ratelimit';
      }
      if (!res.ok) return null;
      totalRequests++;
      updateRateStatus(false);
      const data = await res.json();
      if (typeof data.taken === 'boolean') return data.taken ? 'taken' : 'free';
      return null;
    } catch {
      return null;
    }
  }

  function setMode(m, btn) {
    currentMode = m;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderResults();
  }

  function generate() {
    const chars = getChars();
    const amount = parseInt(document.getElementById('amount').value);
    const modes = currentMode === 'all' ? ['3', '4', 'semi3'] : [currentMode];
    const nameSet = new Set();
    let tries = 0;

    while (nameSet.size < amount && tries < 10000) {
      tries++;
      const mode = modes[Math.floor(Math.random() * modes.length)];
      const name = makeUsername(mode, chars);
      if (name && isValidUsername(name)) nameSet.add(name);
    }

    allUsernames = Array.from(nameSet).map(name => ({
      name,
      type: name.length === 3 ? '3' : (/[a-z]{3}/i.test(name) && name.length > 3) ? 'semi3' : '4',
      status: 'idle'
    }));

    stats.total += allUsernames.length;
    updateStats();
    renderResults();
    showToast(`تم توليد ${allUsernames.length} يوزرنيم`);
  }

  function renderResults() {
    const grid = document.getElementById('resultsGrid');
    let filtered = allUsernames;

    if (currentFilter === '3') filtered = filtered.filter(u => u.name.length === 3);
    else if (currentFilter === '4') filtered = filtered.filter(u => u.name.length === 4);
    else if (currentFilter === 'semi3') filtered = filtered.filter(u => u.name.length >= 4 && u.type === 'semi3');
    else if (currentFilter === 'free') filtered = filtered.filter(u => u.status === 'free');
    else if (currentFilter === 'taken') filtered = filtered.filter(u => u.status === 'taken');

    document.getElementById('resultCount').textContent = filtered.length + ' يوزرنيم';

    if (filtered.length === 0) {
      grid.innerHTML = '<div style="color:var(--muted);font-size:0.9rem;grid-column:1/-1;text-align:center;padding:2rem 0">لا توجد نتائج</div>';
      return;
    }

    grid.innerHTML = filtered.map((u, i) => {
      const typeLabel = u.name.length === 3 ? 'ثلاثي' : u.type === 'semi3' ? 'شبه ثلاثي' : 'رباعي';
      const typeClass = u.name.length === 3 ? 'type-3' : u.type === 'semi3' ? 'type-semi' : 'type-4';
      let statusHtml = '';
      if (u.status === 'idle') {
        statusHtml = `<button class="status-badge status-idle" onclick="quickCheck('${u.name}')">تحقق</button>`;
      } else if (u.status === 'loading') {
        statusHtml = `<span class="status-badge status-loading"><span class="spinner" style="border-top-color:var(--yellow)"></span></span>`;
      } else if (u.status === 'free') {
        statusHtml = `<span class="status-badge status-free">متاح ✓</span>`;
      } else if (u.status === 'unknown') {
        statusHtml = `<button class="status-badge status-idle" onclick="quickCheck('${u.name}')">إعادة</button>`;
      } else {
        statusHtml = `<span class="status-badge status-taken">مستعمل ✗</span>`;
      }
      return `
        <div class="uname-card" style="animation-delay:${i * 0.02}s">
          <div class="uname-top">
            <span class="uname-text" dir="ltr">${u.name}</span>
            <span class="uname-len">${u.name.length}</span>
          </div>
          <div class="uname-bottom">
            <span class="type-badge ${typeClass}">${typeLabel}</span>
            <div style="display:flex;gap:4px;align-items:center">
              ${statusHtml}
              <button class="copy-mini" onclick="copyName('${u.name}')" title="نسخ">⎘</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function quickCheck(name) {
    const u = allUsernames.find(x => x.name === name);
    if (!u) return;
    u.status = 'loading';
    renderResults();
    const result = await realCheck(name);
    if (result === 'ratelimit') {
      u.status = 'idle';
      renderResults();
      return;
    }
    u.status = result !== null ? result : 'unknown';
    stats.checked++;
    if (u.status === 'free') stats.free++;
    else if (u.status === 'taken') stats.taken++;
    updateStats();
    renderResults();
  }

  async function checkAll() {
    const toCheck = allUsernames.filter(u => u.status === 'idle');
    if (toCheck.length === 0) { showToast('كل اليوزرات تم التحقق منها'); return; }
    showToast(`جاري التحقق من ${toCheck.length} يوزرنيم...`);
    renderResults();
    for (let i = 0; i < toCheck.length; i++) {
      const u = toCheck[i];
      u.status = 'loading';
      renderResults();
      const result = await realCheck(u.name);
      if (result === 'ratelimit') {
        u.status = 'idle';
        renderResults();
        showToast('⛔ وصلت الليميت — انتظر قبل تكمل');
        return;
      }
      u.status = result !== null ? result : 'unknown';
      stats.checked++;
      if (u.status === 'free') stats.free++;
      else if (u.status === 'taken') stats.taken++;
      updateStats();
      renderResults();
      await new Promise(r => setTimeout(r, 400));
    }
    showToast('تم التحقق من الكل ✓');
  }

  function copyName(name) {
    navigator.clipboard.writeText(name).then(() => showToast(`تم نسخ: ${name}`));
  }

  function copyAll() {
    if (allUsernames.length === 0) return;
    const text = allUsernames.map(u => u.name).join('\n');
    navigator.clipboard.writeText(text).then(() => showToast(`تم نسخ ${allUsernames.length} يوزرنيم`));
  }

  function sanitizeInput(el) {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_.\-]/g, '');
  }

  async function checkUsername() {
    const val = document.getElementById('checkInput').value.trim().toLowerCase();
    const res = document.getElementById('checkResult');
    const icon = document.getElementById('checkIcon');
    const txt = document.getElementById('checkText');

    if (!val) {
      res.className = 'check-result invalid show';
      icon.textContent = '⚠️';
      txt.textContent = 'أدخل يوزرنيم أولاً';
      return;
    }
    if (val.length < 2) {
      res.className = 'check-result invalid show';
      icon.textContent = '⚠️';
      txt.textContent = 'اليوزرنيم يجب أن يكون حرفين على الأقل';
      return;
    }
    if (!/^[a-z0-9_.]+$/.test(val)) {
      res.className = 'check-result invalid show';
      icon.textContent = '⚠️';
      txt.textContent = 'صيغة غير صالحة — استخدم: أحرف إنجليزية صغيرة، أرقام، _ أو .';
      return;
    }

    res.className = 'check-result loading show';
    icon.innerHTML = '<span class="spinner"></span>';
    txt.textContent = `جاري التحقق من "${val}"...`;

    const result = await realCheck(val);

    if (result === 'ratelimit') {
      const secs = Math.ceil((rateLimitUntil - Date.now()) / 1000);
      res.className = 'check-result invalid show';
      icon.textContent = '⛔';
      txt.textContent = `وصلت الليميت — انتظر ${secs > 0 ? secs : '...'} ثانية`;
      return;
    }

    if (result === null) {
      res.className = 'check-result invalid show';
      icon.textContent = '⚠️';
      txt.textContent = `تعذّر التحقق من "${val}" — جرب لاحقاً`;
      return;
    }

    stats.checked++;
    if (result === 'free') stats.free++;
    else stats.taken++;
    updateStats();

    if (result === 'free') {
      res.className = 'check-result free show';
      icon.textContent = '✅';
      txt.textContent = `"${val}" متاح!`;
    } else {
      res.className = 'check-result taken show';
      icon.textContent = '❌';
      txt.textContent = `"${val}" مستعمل`;
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = stats.total;
    document.getElementById('statFree').textContent = stats.free;
    document.getElementById('statTaken').textContent = stats.taken;
    document.getElementById('statChecked').textContent = stats.checked;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Generate on load
  generate();
</script>
</body>
</html>
